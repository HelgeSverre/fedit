version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        patterns:
          - "*"

  - package-ecosystem: nuget
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      test-deps:
        patterns:
          - "xunit*"
          - "FsUnit*"
          - "FsCheck*"
          - "Microsoft.NET.Test.Sdk"
