name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"

permissions:
  contents: read

jobs:
  # The R2R fallback flavor, shipped as the `fedit-r2r-<triple>` opt-in. The
  # default download is the AOT build (see the `aot` job below).
  build:
    name: R2R ${{ matrix.triple }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            rid: osx-arm64
            triple: aarch64-apple-darwin
            ext: tar.xz
          # Build x64 on the arm64 runner — dotnet publish cross-targets
          # by RID, so we don't need an Intel Mac host. Avoids the macos-13
          # runner queue which is often saturated.
          - os: macos-14
            rid: osx-x64
            triple: x86_64-apple-darwin
            ext: tar.xz
          - os: ubuntu-22.04
            rid: linux-x64
            triple: x86_64-unknown-linux-gnu
            ext: tar.xz
          - os: ubuntu-22.04
            rid: linux-arm64
            triple: aarch64-unknown-linux-gnu
            ext: tar.xz
          - os: windows-2022
            rid: win-x64
            triple: x86_64-pc-windows-msvc
            ext: zip
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: true

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      # Build the vendored tree-sitter grammars for the matrix's RID.
      # Zig acts as a uniform cross-compiler so we don't need per-OS
      # toolchain conditionals. The publish target's <None Include>
      # picks up the resulting natives on the next dotnet publish step.
      - uses: mlugg/setup-zig@v2
      - name: Build tree-sitter grammars for ${{ matrix.rid }}
        shell: bash
        run: |
          case "${{ matrix.rid }}" in
            osx-arm64)   target="aarch64-macos";      ext="dylib"; pfx="lib" ;;
            osx-x64)     target="x86_64-macos";       ext="dylib"; pfx="lib" ;;
            linux-x64)   target="x86_64-linux-gnu";   ext="so";    pfx="lib" ;;
            linux-arm64) target="aarch64-linux-gnu";  ext="so";    pfx="lib" ;;
            win-x64)     target="x86_64-windows-gnu"; ext="dll";   pfx="" ;;
            *) echo "Unknown RID: ${{ matrix.rid }}" >&2; exit 1 ;;
          esac
          dest="src/Fedit/runtimes/${{ matrix.rid }}/native"
          mkdir -p "$dest"
          zig cc -O2 -shared -fPIC -target "$target" \
            -I vendor/tree-sitter-fsharp/fsharp/src \
            -o "$dest/${pfx}tree-sitter-fsharp.${ext}" \
            vendor/tree-sitter-fsharp/fsharp/src/parser.c \
            vendor/tree-sitter-fsharp/fsharp/src/scanner.c
          grammars=(
            "markdown|vendor/tree-sitter-markdown/tree-sitter-markdown/src|parser.c scanner.c"
            "xml|vendor/tree-sitter-xml/xml/src|parser.c scanner.c"
            "dart|vendor/tree-sitter-dart/src|parser.c scanner.c"
            "just|vendor/tree-sitter-just/src|parser.c scanner.c"
            "make|vendor/tree-sitter-make/src|parser.c"
            "astro|vendor/tree-sitter-astro/src|parser.c scanner.c"
            "toml|vendor/tree-sitter-toml/src|parser.c scanner.c"
            "sema|vendor/tree-sitter-sema/src|parser.c scanner.c"
            "applescript|vendor/tree-sitter-applescript/src|parser.c scanner.c"
            "rescript|vendor/tree-sitter-rescript/src|parser.c scanner.c"
            "zig|vendor/tree-sitter-zig/src|parser.c"
          )
          for entry in "${grammars[@]}"; do
            IFS='|' read -r name srcdir files <<< "$entry"
            srcs=""
            for f in $files; do [ -f "$srcdir/$f" ] && srcs="$srcs $srcdir/$f"; done
            zig cc -O2 -UNDEBUG -shared -fPIC -target "$target" \
              -I "$srcdir" -o "$dest/${pfx}tree-sitter-${name}.${ext}" $srcs
            echo "$name OK"
          done

      - name: dotnet publish
        run: dotnet publish src/Fedit/Fedit.fsproj -c Release -r ${{ matrix.rid }} -o dist/${{ matrix.rid }} --nologo

      # Ship the out-of-process plugin host beside the editor — the editor
      # spawns it to load plugins. Self-contained single-file so it runs with
      # no separate runtime (matching the self-contained editor); published to
      # the same dist dir so it lands next to `fedit`.
      - name: publish plugin host
        run: dotnet publish src/Fedit.PluginHost/Fedit.PluginHost.fsproj -c Release -r ${{ matrix.rid }} --self-contained -p:PublishSingleFile=true -o dist/${{ matrix.rid }} --nologo

      - name: stage README + LICENSE
        shell: bash
        run: cp README.md LICENSE dist/${{ matrix.rid }}/

      - name: verify release sidecars
        shell: bash
        run: |
          test -f "dist/${{ matrix.rid }}/Fedit.PluginApi.dll"
          test -f "dist/${{ matrix.rid }}/Fedit.PluginHost" || test -f "dist/${{ matrix.rid }}/Fedit.PluginHost.exe"
          test -d "dist/${{ matrix.rid }}/runtimes/${{ matrix.rid }}/native"
          case "${{ matrix.rid }}" in
            win-x64) ext="dll"; pfx="" ;;
            linux-*) ext="so"; pfx="lib" ;;
            *) ext="dylib"; pfx="lib" ;;
          esac
          for grammar in fsharp markdown xml dart just make astro toml sema applescript rescript zig; do
            test -f "dist/${{ matrix.rid }}/runtimes/${{ matrix.rid }}/native/${pfx}tree-sitter-${grammar}.${ext}"
          done

      - name: archive (unix)
        if: matrix.ext == 'tar.xz'
        shell: bash
        run: |
          tar -cJf "fedit-r2r-${{ matrix.triple }}.tar.xz" -C "dist/${{ matrix.rid }}" .
          shasum -a 256 "fedit-r2r-${{ matrix.triple }}.tar.xz" | awk '{print $1}' > "fedit-r2r-${{ matrix.triple }}.sha256"

      - name: archive (windows)
        if: matrix.ext == 'zip'
        shell: pwsh
        run: |
          Compress-Archive -Path "dist/${{ matrix.rid }}/*" -DestinationPath "fedit-r2r-${{ matrix.triple }}.zip"
          $h = (Get-FileHash -Algorithm SHA256 "fedit-r2r-${{ matrix.triple }}.zip").Hash.ToLower()
          Set-Content -Path "fedit-r2r-${{ matrix.triple }}.sha256" -Value $h -NoNewline

      - name: upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: fedit-r2r-${{ matrix.triple }}
          path: |
            fedit-r2r-${{ matrix.triple }}.${{ matrix.ext }}
            fedit-r2r-${{ matrix.triple }}.sha256
          retention-days: 7
          if-no-files-found: error

  # The DEFAULT release flavor: NativeAOT (~7 MB editor, ~10 ms first paint),
  # archived as `fedit-<triple>` — what Homebrew and the installers pull. The
  # R2R build above ships as the `fedit-r2r-<triple>` opt-in fallback. NativeAOT
  # can't cross-compile across OS — and for Linux not across arch — so
  # linux-arm64 builds on a native ARM runner; macOS cross-builds x64 from the
  # arm64 runner via its universal toolchain.
  aot:
    name: AOT (default) ${{ matrix.triple }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-14, rid: osx-arm64, triple: aarch64-apple-darwin, ext: tar.xz }
          - { os: macos-14, rid: osx-x64, triple: x86_64-apple-darwin, ext: tar.xz }
          - { os: ubuntu-22.04, rid: linux-x64, triple: x86_64-unknown-linux-gnu, ext: tar.xz }
          - { os: ubuntu-22.04-arm, rid: linux-arm64, triple: aarch64-unknown-linux-gnu, ext: tar.xz }
          - { os: windows-2022, rid: win-x64, triple: x86_64-pc-windows-msvc, ext: zip }
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: true

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Install NativeAOT prerequisites (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y clang zlib1g-dev

      - uses: mlugg/setup-zig@v2
      - name: Build tree-sitter grammars for ${{ matrix.rid }}
        shell: bash
        run: |
          case "${{ matrix.rid }}" in
            osx-arm64)   target="aarch64-macos";      ext="dylib"; pfx="lib" ;;
            osx-x64)     target="x86_64-macos";       ext="dylib"; pfx="lib" ;;
            linux-x64)   target="x86_64-linux-gnu";   ext="so";    pfx="lib" ;;
            linux-arm64) target="aarch64-linux-gnu";  ext="so";    pfx="lib" ;;
            win-x64)     target="x86_64-windows-gnu"; ext="dll";   pfx="" ;;
            *) echo "Unknown RID: ${{ matrix.rid }}" >&2; exit 1 ;;
          esac
          dest="src/Fedit/runtimes/${{ matrix.rid }}/native"
          mkdir -p "$dest"
          zig cc -O2 -shared -fPIC -target "$target" \
            -I vendor/tree-sitter-fsharp/fsharp/src \
            -o "$dest/${pfx}tree-sitter-fsharp.${ext}" \
            vendor/tree-sitter-fsharp/fsharp/src/parser.c \
            vendor/tree-sitter-fsharp/fsharp/src/scanner.c
          grammars=(
            "markdown|vendor/tree-sitter-markdown/tree-sitter-markdown/src|parser.c scanner.c"
            "xml|vendor/tree-sitter-xml/xml/src|parser.c scanner.c"
            "dart|vendor/tree-sitter-dart/src|parser.c scanner.c"
            "just|vendor/tree-sitter-just/src|parser.c scanner.c"
            "make|vendor/tree-sitter-make/src|parser.c"
            "astro|vendor/tree-sitter-astro/src|parser.c scanner.c"
            "toml|vendor/tree-sitter-toml/src|parser.c scanner.c"
            "sema|vendor/tree-sitter-sema/src|parser.c scanner.c"
            "applescript|vendor/tree-sitter-applescript/src|parser.c scanner.c"
            "rescript|vendor/tree-sitter-rescript/src|parser.c scanner.c"
            "zig|vendor/tree-sitter-zig/src|parser.c"
          )
          for entry in "${grammars[@]}"; do
            IFS='|' read -r name srcdir files <<< "$entry"
            srcs=""
            for f in $files; do [ -f "$srcdir/$f" ] && srcs="$srcs $srcdir/$f"; done
            zig cc -O2 -UNDEBUG -shared -fPIC -target "$target" \
              -I "$srcdir" -o "$dest/${pfx}tree-sitter-${name}.${ext}" $srcs
          done

      - name: Publish AOT editor + plugin host + sidecar
        shell: bash
        run: |
          dotnet publish src/Fedit/Fedit.fsproj -c Release -r ${{ matrix.rid }} \
            -p:FeditAot=true -o dist-aot/${{ matrix.rid }} --nologo
          dotnet publish src/Fedit.PluginHost/Fedit.PluginHost.fsproj -c Release \
            -r ${{ matrix.rid }} --self-contained -p:PublishSingleFile=true \
            -o dist-aot/${{ matrix.rid }} --nologo
          cp src/Fedit.PluginApi/bin/Release/net10.0/Fedit.PluginApi.dll dist-aot/${{ matrix.rid }}/

      # Validate the shipped AOT bundle: runtime init, AOT-safe JSON, the render
      # + tree-sitter highlight paths, and a full build->load->invoke plugin
      # round-trip. Don't ship an AOT archive that fails this.
      - name: Smoke-test the AOT bundle
        shell: bash
        run: |
          set -euo pipefail
          d="$PWD/dist-aot/${{ matrix.rid }}"
          bin="$d/fedit"; host="$d/Fedit.PluginHost"
          [ -f "$d/fedit.exe" ] && bin="$d/fedit.exe" && host="$d/Fedit.PluginHost.exe"
          "$bin" --version
          "$bin" __plugin-wire-selftest
          "$bin" __render-smoke "$PWD/src/Fedit/Highlight.fs"
          # The Homebrew formula runs `fedit completions {bash,zsh,fish}` at
          # install time (generate_completions_from_executable). If that path
          # reflected under AOT every brew install would break — guard it here:
          # each shell must exit 0 and emit a non-empty script.
          for sh in bash zsh fish; do
            out=$("$bin" completions "$sh") && [ -n "$out" ] || { echo "completions $sh failed under AOT" >&2; exit 1; }
          done
          proot="${RUNNER_TEMP:-/tmp}/fedit-plugins"; rm -rf "$proot"; mkdir -p "$proot"
          cp -r "$PWD/examples/wordcount" "$proot/wordcount"
          "$bin" __plugin-host-selftest "$proot" "$host"

      - name: stage README + LICENSE
        shell: bash
        run: cp README.md LICENSE dist-aot/${{ matrix.rid }}/

      - name: archive (unix)
        if: matrix.ext == 'tar.xz'
        shell: bash
        run: |
          tar -cJf "fedit-${{ matrix.triple }}.tar.xz" -C "dist-aot/${{ matrix.rid }}" .
          shasum -a 256 "fedit-${{ matrix.triple }}.tar.xz" | awk '{print $1}' > "fedit-${{ matrix.triple }}.sha256"

      - name: archive (windows)
        if: matrix.ext == 'zip'
        shell: pwsh
        run: |
          Compress-Archive -Path "dist-aot/${{ matrix.rid }}/*" -DestinationPath "fedit-${{ matrix.triple }}.zip"
          $h = (Get-FileHash -Algorithm SHA256 "fedit-${{ matrix.triple }}.zip").Hash.ToLower()
          Set-Content -Path "fedit-${{ matrix.triple }}.sha256" -Value $h -NoNewline

      - name: upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: fedit-${{ matrix.triple }}
          path: |
            fedit-${{ matrix.triple }}.${{ matrix.ext }}
            fedit-${{ matrix.triple }}.sha256
          retention-days: 7
          if-no-files-found: error

  publish:
    name: Publish release + update homebrew tap
    needs: [build, aot]
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7

      - name: download artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: flatten artifacts to release/
        shell: bash
        run: |
          mkdir -p release
          find artifacts -type f \( -name '*.tar.xz' -o -name '*.zip' -o -name '*.sha256' \) \
            -exec mv {} release/ \;
          ls -la release/

      - name: compute version (strip leading v)
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "fedit ${{ steps.version.outputs.version }}" \
            --generate-notes \
            release/*.tar.xz release/*.zip release/*.sha256

      - name: render homebrew formula
        run: bash scripts/render-formula.sh "${{ steps.version.outputs.version }}" release > /tmp/fedit.rb

      - name: checkout homebrew-tap
        uses: actions/checkout@v7
        with:
          repository: HelgeSverre/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: commit + push updated formula
        shell: bash
        run: |
          mv /tmp/fedit.rb homebrew-tap/Formula/fedit.rb
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/fedit.rb
          # `--cached` reads the staged tree — handles both 'changed' and
          # 'newly tracked' correctly. Without --cached, an untracked file
          # registers as "no diff" and we'd skip the commit silently.
          if git diff --cached --quiet -- Formula/fedit.rb; then
            echo "No formula changes — skipping commit."
            exit 0
          fi
          git commit -m "fedit ${{ steps.version.outputs.version }}"
          git push
