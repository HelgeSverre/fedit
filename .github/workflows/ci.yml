name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs so force-pushing during review doesn't burn minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  ContinuousIntegrationBuild: true

jobs:
  format-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json
      - uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.fsproj', '**/Directory.Packages.props', 'global.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget-
      - name: Restore tools
        run: dotnet tool restore
      - name: Fantomas check
        run: dotnet fantomas --check .

  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
            lib: src/Fedit/runtimes/linux-x64/native/libtree-sitter-fsharp.so
          - os: macos-latest
            rid: osx-arm64
            lib: src/Fedit/runtimes/osx-arm64/native/libtree-sitter-fsharp.dylib
          - os: windows-latest
            rid: win-x64
            lib: src/Fedit/runtimes/win-x64/native/tree-sitter-fsharp.dll
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
      - uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json
      - uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.fsproj', '**/Directory.Packages.props', 'global.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget-
      # Build the F# tree-sitter grammar for this matrix leg. The
      # binaries aren't tracked in git (~11MB each); zig acts as a
      # uniform C compiler across all three runners.
      - uses: mlugg/setup-zig@v1
      - name: Build tree-sitter-fsharp ($${{ matrix.rid }})
        shell: bash
        run: |
          mkdir -p "$(dirname "${{ matrix.lib }}")"
          zig cc -O2 -shared -fPIC \
            -I vendor/tree-sitter-fsharp/fsharp/src \
            -o "${{ matrix.lib }}" \
            vendor/tree-sitter-fsharp/fsharp/src/parser.c \
            vendor/tree-sitter-fsharp/fsharp/src/scanner.c
      - name: Build
        run: dotnet build Fedit.slnx --nologo
      - name: Test
        run: dotnet test Fedit.slnx --nologo --verbosity normal --collect:"XPlat Code Coverage" --results-directory TestResults
      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: TestResults/**/coverage.cobertura.xml
          fail_ci_if_error: false
