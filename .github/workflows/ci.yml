name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs so force-pushing during review doesn't burn minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  ContinuousIntegrationBuild: true

jobs:
  format-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json
      - uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.fsproj', '**/Directory.Packages.props', 'global.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget-
      - name: Restore tools
        run: dotnet tool restore
      - name: Fantomas check
        run: dotnet fantomas --check .

  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
            lib: src/Fedit/runtimes/linux-x64/native/libtree-sitter-fsharp.so
          - os: macos-latest
            rid: osx-arm64
            lib: src/Fedit/runtimes/osx-arm64/native/libtree-sitter-fsharp.dylib
          - os: windows-latest
            rid: win-x64
            lib: src/Fedit/runtimes/win-x64/native/tree-sitter-fsharp.dll
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
      - uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json
      - uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.fsproj', '**/Directory.Packages.props', 'global.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget-
      # Build all native grammars for this matrix leg. Binaries aren't
      # tracked in git; zig acts as a uniform C compiler across runners.
      - uses: mlugg/setup-zig@v2
      - name: Build grammars (${{ matrix.rid }})
        shell: bash
        run: |
          dest="$(dirname "${{ matrix.lib }}")"
          mkdir -p "$dest"
          case "${{ matrix.rid }}" in
            win-x64)  ext=dll;   pfx="" ;;
            linux-*)  ext=so;    pfx=lib ;;
            *)        ext=dylib; pfx=lib ;;
          esac
          zig cc -O2 -shared -fPIC \
            -I vendor/tree-sitter-fsharp/fsharp/src \
            -o "${{ matrix.lib }}" \
            vendor/tree-sitter-fsharp/fsharp/src/parser.c \
            vendor/tree-sitter-fsharp/fsharp/src/scanner.c
          grammars=(
            "markdown|vendor/tree-sitter-markdown/tree-sitter-markdown/src|parser.c scanner.c"
            "xml|vendor/tree-sitter-xml/xml/src|parser.c scanner.c"
            "dart|vendor/tree-sitter-dart/src|parser.c scanner.c"
            "just|vendor/tree-sitter-just/src|parser.c scanner.c"
            "make|vendor/tree-sitter-make/src|parser.c"
            "astro|vendor/tree-sitter-astro/src|parser.c scanner.c"
            "toml|vendor/tree-sitter-toml/src|parser.c scanner.c"
            "sema|vendor/tree-sitter-sema/src|parser.c scanner.c"
            "applescript|vendor/tree-sitter-applescript/src|parser.c scanner.c"
            "rescript|vendor/tree-sitter-rescript/src|parser.c scanner.c"
            "zig|vendor/tree-sitter-zig/src|parser.c"
          )
          for entry in "${grammars[@]}"; do
            IFS='|' read -r name srcdir files <<< "$entry"
            srcs=""
            for f in $files; do [ -f "$srcdir/$f" ] && srcs="$srcs $srcdir/$f"; done
            zig cc -O2 -UNDEBUG -shared -fPIC \
              -I "$srcdir" -o "$dest/${pfx}tree-sitter-${name}.${ext}" $srcs
            echo "$name OK"
          done
      - name: Build
        run: dotnet build Fedit.slnx --nologo
      # Generated completion scripts assert on the parser config but never
      # run; pipe each through its shell's parser so emitter regressions
      # fail here instead of in a user's shell.
      - name: Verify completion scripts parse
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends zsh fish
          gen() { dotnet run --project src/Fedit/Fedit.fsproj --no-build -- completions "$1"; }
          gen bash > /tmp/fedit.bash && bash -n /tmp/fedit.bash && echo "bash OK"
          gen zsh  > /tmp/_fedit     && zsh  -n /tmp/_fedit    && echo "zsh OK"
          gen fish > /tmp/fedit.fish && fish --no-execute /tmp/fedit.fish && echo "fish OK"
          gen pwsh > /tmp/fedit.ps1
          if command -v pwsh >/dev/null; then
            pwsh -NoProfile -Command '
              $errs = $null
              [System.Management.Automation.Language.Parser]::ParseInput((Get-Content -Raw /tmp/fedit.ps1), [ref]$null, [ref]$errs) | Out-Null
              if ($errs) { $errs | ForEach-Object { $_.Message }; exit 1 }
              "pwsh OK"'
          else
            echo "pwsh not available — skipping pwsh parse check"
          fi
          # xonsh scripts are plain Python — validate syntax without a xonsh install.
          gen xonsh > /tmp/fedit_xsh.py && python3 -m py_compile /tmp/fedit_xsh.py && echo "xonsh OK"
          # nushell/elvish are niche; their emitters are covered by unit tests
          # and the docker harness in tests/completions/ (just test-completions).
      - name: Test
        run: dotnet test Fedit.slnx --nologo --verbosity normal --collect:"XPlat Code Coverage" --results-directory TestResults
      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: TestResults/**/coverage.cobertura.xml
          fail_ci_if_error: false
